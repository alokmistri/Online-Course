<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grab Offer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.glow {
  box-shadow: 0 0 20px rgba(255,115,0,0.6);
}
</style>

</head>

<body class="bg-gray-950 text-white">

<!-- HEADER -->
<nav class="flex justify-between px-6 py-4 border-b border-white/10">
  <h1 class="text-xl font-bold text-orange-400">CoreSkill Academy</h1>
  <span class="text-red-400 animate-pulse">🔥 Offer Live</span>
</nav>

<!-- TITLE -->
<section class="text-center py-12">
  <h2 class="text-4xl font-bold mb-3">🎯 Special Course Offers</h2>
  <p class="text-white/70">Limited Time Discounted Courses</p>
</section>

<!-- COURSE GRID -->
<section class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-6">

  <!-- CARD 1 -->
  <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl overflow-hidden hover:scale-105 transition">

    <!-- IMAGE -->
    <img src="excel.jpg" class="w-full h-40 object-cover">

    <!-- CONTENT -->
    <div class="p-4">
      <h3 class="font-bold text-lg">MS Excel Full Course</h3>
      <p class="text-sm text-gray-400">Basic to Advanced</p>

      <!-- PRICE -->
      <div class="flex justify-between items-center mt-3">
        <div>
          <span class="text-gray-400 line-through text-sm">₹1999</span>
          <span class="text-green-400 font-bold text-lg ml-2">₹499</span>
        </div>

        <a href="excel.html" class="bg-orange-500 px-3 py-1 rounded text-sm glow">
          View
        </a>
      </div>
    </div>
  </div>

  <!-- CARD 2 -->
  <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl overflow-hidden hover:scale-105 transition">

    <img src="sap.jpg" class="w-full h-40 object-cover">

    <div class="p-4">
      <h3 class="font-bold text-lg">SAP Course</h3>
      <p class="text-sm text-gray-400">S/4 HANA Training</p>

      <div class="flex justify-between items-center mt-3">
        <div>
          <span class="text-gray-400 line-through text-sm">₹2999</span>
          <span class="text-green-400 font-bold text-lg ml-2">₹799</span>
        </div>

        <a href="sap.html" class="bg-orange-500 px-3 py-1 rounded text-sm glow">
          View
        </a>
      </div>
    </div>
  </div>

  <!-- CARD 3 (YOUR STYLE) -->
  <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl overflow-hidden hover:scale-105 transition">

    <img src="tally.jpg" class="w-full h-40 object-cover">

    <div class="p-4">
      <h3 class="font-bold text-lg">Tally + GST</h3>
      <p class="text-sm text-gray-400">Accounting Course</p>

      <div class="flex justify-between items-center mt-3">
        <div>
          <span class="text-gray-400 line-through text-sm">₹1999</span>
          <span class="text-green-400 font-bold text-lg ml-2">₹499</span>
        </div>

        <a href="tally.html" class="bg-orange-500 px-3 py-1 rounded text-sm glow">
          View
        </a>
      </div>
    </div>
  </div>

</section>

<!-- FOOTER -->
<footer class="text-center py-6 text-white/50 text-sm mt-10">
  © 2026 CoreSkill Academy
</footer>

</body>
</html>
