<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-100 via-white to-gray-200 min-h-screen text-gray-800">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg">

<h2 class="text-xl font-bold text-purple-600 text-center mb-4">
💳 EMI Payment System
</h2>

<!-- COURSE -->
<select id="course" onchange="calculateEMI()"
  class="w-full p-3 border rounded mb-3">

  <option value="">Select Course</option>
  <option value="499">MS Basic - ₹499</option>
  <option value="999">Advanced Excel - ₹999</option>
  <option value="1499">Tally + GST - ₹1499</option>
  <option value="1999">Power BI - ₹1999</option>
  <option value="2999">Full Bundle - ₹2999</option>

</select>

<!-- EMI RESULT -->
<p id="result" class="text-green-600 font-semibold text-center mb-4"></p>

<!-- BUTTON -->
<button onclick="showPaymentOptions()"
  class="w-full bg-green-500 text-white py-3 rounded mb-4">

🚀 Start EMI Now
</button>

<!-- PAYMENT OPTIONS -->
<div id="paymentBox" class="hidden space-y-4">

  <!-- QR -->
  <div class="border p-4 rounded text-center">
    <p class="font-semibold mb-2">📷 QR Code</p>
    <img src="qr.png" class="w-32 mx-auto mb-2">
    <a href="qr.png" download class="text-blue-500 text-sm underline">Download QR</a>
  </div>

  <!-- NEFT -->
  <div class="border p-4 rounded text-sm">
    <p class="font-semibold mb-2">🏦 NEFT / RTGS</p>
    <p>A/C: 410610510000064</p>
    <p>IFSC: BKID0004106</p>
  </div>

  <!-- UPI -->
  <div class="border p-4 rounded flex justify-between items-center">
    <span id="upi">alokmistri69-2@oksbi</span>
    <button onclick="copyUPI()" class="bg-purple-500 text-white px-3 py-1 rounded text-sm">Copy</button>
  </div>

  <!-- EMAIL -->
  <input id="email" type="email" placeholder="Enter your Email"
    class="w-full p-2 border rounded">

  <!-- CONFIRM -->
  <button onclick="sendWhatsApp()"
    class="w-full bg-purple-600 text-white py-3 rounded">

📩 Confirm EMI Payment
  </button>

</div>

</div>

<script>

let selectedCourse = "";
let selectedAmount = "";
let emiAmount = "";

// EMI CALC
function calculateEMI() {
  const select = document.getElementById("course");
  selectedAmount = select.value;
  selectedCourse = select.options[select.selectedIndex].text;

  if (!selectedAmount || selectedAmount <= 99) {
    document.getElementById("result").innerText =
      "❌ EMI not available";
    return;
  }

  emiAmount = (selectedAmount / 6).toFixed(2);

  document.getElementById("result").innerText =
    `EMI: ₹${emiAmount}/month × 6`;
}

// SHOW OPTIONS
function showPaymentOptions() {
  if (!selectedAmount) {
    alert("Select course first");
    return;
  }

  document.getElementById("paymentBox").classList.remove("hidden");
}

// COPY UPI
function copyUPI() {
  const text = document.getElementById("upi").innerText;
  navigator.clipboard.writeText(text);
  alert("UPI Copied");
}

// WHATSAPP
function sendWhatsApp() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  const now = new Date();
  const date = now.toLocaleDateString();
  const time = now.toLocaleTimeString();

  const msg = `Hi, I started EMI Payment

Course: ${selectedCourse}
EMI: ₹${emiAmount}/month
Date: ${date}
Time: ${time}
Email: ${email}`;

  window.open(`https://wa.me/917439034248?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
