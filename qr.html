<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay via QR</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatY {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 40px rgba(59,130,246,.35); }
      50% { box-shadow: 0 0 70px rgba(59,130,246,.6); }
      100% { box-shadow: 0 0 40px rgba(59,130,246,.35); }
    }

    .fade-up { animation: fadeUp .9s ease both; }
    .float { animation: floatY 4s ease-in-out infinite; }
    .glow-pulse { animation: pulseGlow 3s ease-in-out infinite; }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-gray-200 min-h-screen text-gray-800">

<!-- HEADER -->
<div class="flex justify-between items-center p-4">
  <button onclick="window.location.href='index.html'" class="text-orange-500 text-sm">
    ← Back
  </button>

  <a href="https://wa.me/917439034248?text=Hi I want help with payment"
    class="bg-green-500 text-white px-4 py-2 rounded text-sm">
    WhatsApp
  </a>
</div>

<!-- TITLE -->
<div class="text-center mt-6">
  <h1 class="text-3xl font-bold">Pay via QR Code</h1>
  <p class="text-gray-500">Secure & instant payment</p>
</div>

<!-- MAIN -->
<div class="max-w-6xl mx-auto px-4 mt-10 grid lg:grid-cols-2 gap-10 items-center">

  <!-- LEFT -->
  <div class="bg-white rounded-2xl shadow-lg p-6 text-center">

    <!-- QR -->
    <img src="qr.png" class="w-48 mx-auto rounded mb-3">

    <!-- DOWNLOAD BUTTON -->
    <a href="qr.png" download
      class="text-blue-500 text-sm underline block mb-3">
      ⬇ Download QR Code
    </a>

    <p class="text-sm text-gray-600 mb-3">
      Scan with any UPI app
    </p>

    <p class="text-red-500 text-sm mb-4">
      ⚠️ Send screenshot after payment
    </p>

    <!-- COURSE -->
    <select id="course" class="w-full p-3 border rounded mb-3">
      <option value="">Select Course</option>
      <option value="MS Basic - ₹499">MS Basic - ₹499</option>
      <option value="Advanced Excel - ₹999">Advanced Excel - ₹999</option>
      <option value="Tally + GST - ₹1499">Tally + GST - ₹1499</option>
      <option value="Power BI - ₹1999">Power BI - ₹1999</option>
    </select>

    <!-- EMAIL -->
    <input id="email" type="email" placeholder="Enter your email"
      class="w-full p-3 border rounded mb-3">

    <!-- BUTTON -->
    <button onclick="sendWhatsApp()"
      class="w-full bg-green-500 text-white py-3 rounded">

      Confirm Payment
    </button>

  </div>

  <!-- RIGHT -->
  <div class="flex justify-center">
    <div class="relative float">

      <div class="w-64 h-64 rounded-full border-4 border-blue-500 flex items-center justify-center glow-pulse">
        <div class="w-56 h-56 rounded-full overflow-hidden border-4 border-blue-200">
          <img src="student1.jpg" class="w-full h-full object-cover">
        </div>
      </div>

      <div class="absolute top-5 right-0 bg-white px-3 py-1 rounded text-xs shadow">
        Smart Learning
      </div>

    </div>
  </div>

</div>

<!-- SCRIPT -->
<script>
function sendWhatsApp() {
  const email = document.getElementById("email").value.trim();
  const course = document.getElementById("course").value;

  if (!course) {
    alert("Select course");
    return;
  }

  if (!email) {
    alert("Enter email");
    return;
  }

  // AUTO DATE + TIME
  const now = new Date();
  const date = now.toLocaleDateString();
  const time = now.toLocaleTimeString();

  const msg = `Hi, I have completed payment.

Course: ${course}
Email: ${email}
Date: ${date}
Time: ${time}`;

  window.open(`https://wa.me/917439034248?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
