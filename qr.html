<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay via QR</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatY {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 40px rgba(59,130,246,.35); }
      50% { box-shadow: 0 0 70px rgba(59,130,246,.6); }
      100% { box-shadow: 0 0 40px rgba(59,130,246,.35); }
    }

    @keyframes blobMove {
      0% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px,-20px) scale(1.1); }
      100% { transform: translate(0,0) scale(1); }
    }

    .fade-up { animation: fadeUp .9s ease both; }
    .delay-1 { animation-delay: .1s; }
    .delay-2 { animation-delay: .2s; }
    .delay-3 { animation-delay: .3s; }

    .float { animation: floatY 4s ease-in-out infinite; }
    .glow-pulse { animation: pulseGlow 3s ease-in-out infinite; }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-gray-200 min-h-screen text-gray-800 overflow-x-hidden">

<!-- HEADER -->
<div class="flex justify-between items-center p-4 sm:p-6 fade-up">
  <button onclick="goBack()" class="text-orange-500 text-sm hover:underline">
    ← Back
  </button>

  <a href="https://wa.me/917439034248?text=Hi I want help with payment"
    class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-600 shadow-md">
    WhatsApp
  </a>
</div>

<!-- TITLE -->
<div class="text-center mt-6 fade-up delay-1">
  <h1 class="text-3xl sm:text-4xl font-bold">Pay via QR Code</h1>
  <p class="text-gray-500 mt-2">Secure & instant payment experience</p>
</div>

<!-- MAIN -->
<div class="max-w-6xl mx-auto px-4 mt-10 grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">

  <!-- LEFT -->
  <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-6 text-center fade-up delay-2">

    <img src="qr.png" class="w-48 mx-auto rounded-xl shadow mb-4">

    <p class="text-sm text-gray-600 mb-3">
      Scan with any UPI app (GPay, PhonePe, Paytm)
    </p>

    <p class="text-red-500 font-semibold text-sm mb-5">
      ⚠️ After payment, send screenshot on WhatsApp
    </p>

    <!-- COURSE -->
    <select id="course"
      class="w-full p-3 rounded-xl border border-gray-300 mb-3 text-sm">

      <option value="">🎯 Select Course</option>

      <option value="MS Basic - ₹499">MS Basic - ₹499</option>
      <option value="Advanced Excel - ₹999">Advanced Excel - ₹999</option>
      <option value="Tally + GST - ₹1499">Tally + GST - ₹1499</option>
      <option value="Power BI - ₹1999">Power BI - ₹1999</option>
      <option value="Peachtree - ₹999">Peachtree - ₹999</option>

      <option value="🔥 Combo Offer - ₹1999">🔥 Combo Offer - ₹1999</option>
      <option value="🔥 Full Bundle - ₹2999">🔥 Full Bundle - ₹2999</option>
    </select>

    <!-- EMAIL -->
    <input id="email" type="email" placeholder="Enter your Email"
      class="w-full p-3 rounded-xl border border-gray-300 mb-3 text-sm">

    <!-- BUTTON -->
    <button onclick="sendWhatsApp()"
      class="bg-green-500 w-full text-white py-3 rounded-xl shadow hover:bg-green-600">

      🚀 Confirm Payment
    </button>

  </div>

  <!-- RIGHT -->
  <div class="flex justify-center fade-up delay-3">

    <div class="relative float">

      <div class="absolute inset-0 rounded-full blur-2xl bg-blue-400/30"></div>

      <div class="w-64 h-64 rounded-full border-4 border-blue-500 flex items-center justify-center glow-pulse">

        <div class="w-56 h-56 rounded-full overflow-hidden border-4 border-blue-200">
          <img src="student1.jpg" class="w-full h-full object-cover">
        </div>

      </div>

      <div class="absolute top-5 right-0 bg-white px-3 py-1 rounded shadow text-xs">
        AI Powered Learning
      </div>

      <div class="absolute bottom-[-15px] left-1/2 transform -translate-x-1/2 bg-white px-3 py-1 rounded shadow text-xs">
        <b class="text-blue-600">5000+</b> Students
      </div>

    </div>

  </div>

</div>

<!-- FOOT -->
<div class="text-center mt-12 text-sm text-gray-500">
  Trusted by thousands of learners 🚀
</div>

<!-- SCRIPT -->
<script>
function goBack() {
  window.location.href = "index.html";
}

function sendWhatsApp() {
  const email = document.getElementById("email").value.trim();
  const course = document.getElementById("course").value;

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!course) {
    alert("⚠️ Please select a course");
    return;
  }

  if (!email) {
    alert("⚠️ Please enter your email");
    return;
  }

  if (!emailPattern.test(email)) {
    alert("❌ Invalid email");
    return;
  }

  const message = `Hi, I have completed payment.\n\nCourse: ${course}\nEmail: ${email}`;
  const url = `https://wa.me/917439034248?text=${encodeURIComponent(message)}`;

  window.open(url, '_blank');
}
</script>

</body>
</html>
