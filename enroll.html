<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Payment Method</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-800 via-gray-900 to-black text-white min-h-screen">

  <!-- Header -->
  <div class="flex items-center p-4 sm:p-6">
    <button onclick="goBack()" 
      class="bg-white/10 px-3 py-1 rounded-lg text-sm hover:bg-white/20 transition">
      ← Back
    </button>
  </div>

  <!-- Title -->
  <section class="text-center mt-4 sm:mt-6 mb-8 sm:mb-10 px-4">
    <h1 class="text-2xl sm:text-3xl font-bold tracking-wide">Choose Payment Method</h1>
    <p class="text-gray-400 mt-2 text-sm sm:text-base">Secure & fast payment options</p>
  </section>

  <!-- 🎓 STUDENTS EMOJI SECTION -->
  <div class="flex justify-center gap-4 sm:gap-6 mb-8">

    <div class="bg-white/10 w-12 h-12 sm:w-14 sm:h-14 flex items-center justify-center rounded-full text-xl sm:text-2xl backdrop-blur-lg">
      🎓
    </div>

    <div class="bg-white/10 w-12 h-12 sm:w-14 sm:h-14 flex items-center justify-center rounded-full text-xl sm:text-2xl backdrop-blur-lg">
      👨‍🎓
    </div>

    <div class="bg-white/10 w-12 h-12 sm:w-14 sm:h-14 flex items-center justify-center rounded-full text-xl sm:text-2xl backdrop-blur-lg">
      👩‍🎓
    </div>

  </div>

  <!-- OPTIONS GRID -->
  <div class="grid grid-cols-2 sm:grid-cols-2 gap-4 sm:gap-6 max-w-md mx-auto px-4">

    <!-- QR -->
    <div onclick="goTo('qr.html')" 
      class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-4 sm:p-5 text-center cursor-pointer hover:scale-105 hover:bg-white/10 transition">

      <img src="https://cdn-icons-png.flaticon.com/512/483/483947.png" 
        class="w-14 h-14 sm:w-16 sm:h-16 mx-auto mb-2 sm:mb-3 rounded-full bg-white p-2 sm:p-3">

      <p class="font-semibold text-sm sm:text-base">QR Code</p>
    </div>

    <!-- BANK -->
    <div onclick="goTo('bank.html')" 
      class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-4 sm:p-5 text-center cursor-pointer hover:scale-105 hover:bg-white/10 transition">

      <img src="https://cdn-icons-png.flaticon.com/512/2830/2830284.png" 
        class="w-14 h-14 sm:w-16 sm:h-16 mx-auto mb-2 sm:mb-3 rounded-full bg-white p-2 sm:p-3">

      <p class="font-semibold text-sm sm:text-base">NEFT / RTGS</p>
    </div>

    <!-- UPI -->
    <div onclick="goTo('upi.html')" 
      class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-4 sm:p-5 text-center cursor-pointer hover:scale-105 hover:bg-white/10 transition">

      <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png" 
        class="w-14 h-14 sm:w-16 sm:h-16 mx-auto mb-2 sm:mb-3 rounded-full bg-white p-2 sm:p-3">

      <p class="font-semibold text-sm sm:text-base">UPI Payment</p>
    </div>

    <!-- EMI -->
    <div onclick="goTo('emi.html')" 
      class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-4 sm:p-5 text-center cursor-pointer hover:scale-105 hover:bg-white/10 transition">

      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135679.png" 
        class="w-14 h-14 sm:w-16 sm:h-16 mx-auto mb-2 sm:mb-3 rounded-full bg-white p-2 sm:p-3">

      <p class="font-semibold text-sm sm:text-base">Installments</p>
    </div>

  </div>

  <!-- FOOTER NOTE -->
  <div class="text-center mt-10 text-gray-500 text-xs sm:text-sm mb-28 px-4">
    Choose your preferred payment method to continue
  </div>

  <!-- CONTACT FLOAT BAR -->
  <div class="fixed bottom-4 sm:bottom-5 left-1/2 transform -translate-x-1/2 w-[92%] max-w-md">

    <div class="flex justify-between items-center bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl px-3 sm:px-4 py-2 sm:py-3 shadow-lg">

      <!-- WhatsApp -->
      <a href="https://wa.me/917439034248" target="_blank"
        class="flex items-center gap-2 bg-green-500 hover:bg-green-600 px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-semibold transition">

        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" 
          class="w-4 h-4 sm:w-5 sm:h-5">

        WhatsApp
      </a>

      <!-- Email -->
      <a href="mailto:a.mistri2004@gmail.com"
        class="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-semibold transition">

        <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" 
          class="w-4 h-4 sm:w-5 sm:h-5">

        Email
      </a>

    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function goTo(page) {
      window.location.href = page;
    }

    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
