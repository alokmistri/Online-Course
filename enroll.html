<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Payment Method</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-gray-100 to-gray-200 text-gray-800 min-h-screen">

  <!-- HEADER -->
  <div class="flex items-center justify-between p-4 sm:p-6">
    <button onclick="goBack()" class="text-orange-500 text-sm hover:underline">
      ← Back
    </button>

    <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">
      Contact
    </button>
  </div>

  <!-- HERO SECTION -->
  <div class="flex flex-col lg:flex-row items-center justify-between max-w-6xl mx-auto px-6 py-10 gap-10">

    <!-- LEFT CONTENT -->
    <div class="max-w-xl text-center lg:text-left">
      <p class="text-blue-500 font-semibold mb-2">ONLINE E-LEARNING COURSE</p>

      <h1 class="text-3xl sm:text-4xl font-bold leading-tight mb-4">
        Online Education <br> Feels Like Real Classroom
      </h1>

      <p class="text-gray-600 text-sm mb-6">
        ✔ Professional Courses &nbsp;&nbsp;
        ✔ Job-ready Skills &nbsp;&nbsp;
        ✔ Learn Anytime Anywhere
      </p>

      <button class="bg-blue-600 text-white px-5 py-2 rounded-lg mr-3">
        Get Started
      </button>

      <button class="bg-gray-300 px-5 py-2 rounded-lg">
        Our Courses
      </button>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="relative">

      <!-- OUTER -->
      <div class="w-64 h-64 sm:w-72 sm:h-72 rounded-full border-4 border-blue-500 flex items-center justify-center">

        <!-- INNER -->
        <div class="w-56 h-56 sm:w-64 sm:h-64 rounded-full border-4 border-blue-200 overflow-hidden">

          <img src="student.png" class="w-full h-full object-cover">

        </div>
      </div>

      <!-- BADGE -->
      <div class="absolute -right-6 top-10 bg-white px-3 py-1 rounded-lg shadow text-sm">
        <span class="text-red-500 font-semibold">Professional+</span><br>
        Courses
      </div>

      <!-- STUDENTS -->
      <div class="absolute left-1/2 -bottom-6 transform -translate-x-1/2 bg-white px-4 py-2 rounded-xl shadow text-sm">
        <span class="text-blue-600 font-bold">5000+</span> Students
      </div>

    </div>

  </div>

  <!-- PAYMENT SECTION -->
  <section class="mt-16">

    <h2 class="text-center text-2xl font-bold mb-8">
      Choose Payment Method
    </h2>

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-6 max-w-5xl mx-auto px-6">

      <!-- QR -->
      <div onclick="goTo('qr.html')" 
        class="bg-white p-5 rounded-2xl shadow hover:scale-105 transition text-center cursor-pointer">

        <img src="https://cdn-icons-png.flaticon.com/512/483/483947.png"
          class="w-14 h-14 mx-auto mb-3">

        <p class="font-semibold">QR Code</p>
      </div>

      <!-- BANK -->
      <div onclick="goTo('bank.html')" 
        class="bg-white p-5 rounded-2xl shadow hover:scale-105 transition text-center cursor-pointer">

        <img src="https://cdn-icons-png.flaticon.com/512/2830/2830284.png"
          class="w-14 h-14 mx-auto mb-3">

        <p class="font-semibold">NEFT / RTGS</p>
      </div>

      <!-- UPI -->
      <div onclick="goTo('upi.html')" 
        class="bg-white p-5 rounded-2xl shadow hover:scale-105 transition text-center cursor-pointer">

        <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png"
          class="w-14 h-14 mx-auto mb-3">

        <p class="font-semibold">UPI</p>
      </div>

      <!-- EMI -->
      <div onclick="goTo('emi.html')" 
        class="bg-white p-5 rounded-2xl shadow hover:scale-105 transition text-center cursor-pointer">

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135679.png"
          class="w-14 h-14 mx-auto mb-3">

        <p class="font-semibold">Installments</p>
      </div>

    </div>

  </section>

  <!-- CONTACT FLOAT BAR -->
  <div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 w-[92%] max-w-md">

    <div class="flex justify-between items-center bg-white border rounded-2xl px-4 py-3 shadow-lg">

      <!-- WhatsApp -->
      <a href="https://wa.me/917439034248" target="_blank"
        class="flex items-center gap-2 bg-green-500 hover:bg-green-600 px-4 py-2 rounded-xl text-sm text-white font-semibold transition">

        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="w-5 h-5">
        WhatsApp
      </a>

      <!-- Email -->
      <a href="mailto:a.mistri2004@gmail.com"
        class="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-xl text-sm text-white font-semibold transition">

        <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" class="w-5 h-5">
        Email
      </a>

    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function goTo(page) {
      window.location.href = page;
    }

    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
