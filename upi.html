<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPI Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatY {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 40px rgba(34,197,94,.3); }
      50% { box-shadow: 0 0 70px rgba(34,197,94,.6); }
      100% { box-shadow: 0 0 40px rgba(34,197,94,.3); }
    }

    .fade-up { animation: fadeUp .8s ease both; }
    .float { animation: floatY 4s ease-in-out infinite; }
    .glow-pulse { animation: pulseGlow 3s ease-in-out infinite; }

    .magnetic {
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .magnetic:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 30px rgba(34,197,94,.35);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-green-100 via-white to-gray-200 min-h-screen text-gray-800">

<!-- HEADER -->
<div class="flex justify-between items-center p-4 sm:p-6 fade-up">

  <button onclick="window.location.href='index.html'" 
    class="text-green-600 text-sm hover:underline">
    ← Back
  </button>

  <a href="https://wa.me/917439034248?text=Hi I want help with payment"
    class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-600">
    WhatsApp
  </a>

</div>

<!-- TITLE -->
<div class="text-center mt-6 fade-up">
  <h1 class="text-3xl sm:text-4xl font-bold">Pay via UPI</h1>
  <p class="text-gray-500 mt-2">Fast & secure UPI payment</p>
</div>

<!-- MAIN -->
<div class="max-w-6xl mx-auto px-4 mt-10 grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">

  <!-- LEFT CARD -->
  <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-6 sm:p-8 fade-up">

    <h2 class="text-xl font-bold text-green-600 mb-6 text-center">
      💳 UPI Payment
    </h2>

    <!-- UPI BOX -->
    <div class="bg-gray-100 border rounded-xl p-4 flex justify-between items-center">
      <span id="upiText" class="font-semibold break-all">
        alokmistri69-2@oksbi
      </span>

      <button onclick="copyUPI()"
        class="bg-green-500 text-white px-3 py-1 rounded text-sm">
        📋 Copy
      </button>
    </div>

    <p id="copyMsg" class="text-green-600 text-sm mt-2 hidden text-center">
      ✅ UPI Copied!
    </p>

    <!-- WARNING -->
    <p class="text-red-500 text-sm mt-6 text-center animate-pulse">
      ⚠️ After payment, send screenshot on WhatsApp
    </p>

    <!-- COURSE -->
    <select id="course"
      class="w-full mt-6 p-3 rounded-xl border border-gray-300">

      <option value="">🎯 Select Course</option>

      <option value="MS Basic - ₹499">MS Basic - ₹499</option>
      <option value="Advanced Excel - ₹999">Advanced Excel - ₹999</option>
      <option value="Tally + GST - ₹1499">Tally + GST - ₹1499</option>
      <option value="Power BI - ₹1999">Power BI - ₹1999</option>
      <option value="Peachtree - ₹999">Peachtree - ₹999</option>

      <option value="🔥 Combo Offer - ₹1999">🔥 Combo Offer - ₹1999</option>
      <option value="🔥 Full Bundle - ₹2999">🔥 Full Bundle - ₹2999</option>

    </select>

    <!-- EMAIL -->
    <input id="email" type="email" placeholder="Enter your Email"
      class="w-full mt-3 p-3 rounded-xl border border-gray-300">

    <!-- BUTTON -->
    <button onclick="sendWhatsApp()"
      class="magnetic mt-4 w-full bg-green-500 text-white py-3 rounded-xl">

      🚀 Confirm Payment
    </button>

  </div>

  <!-- RIGHT IMAGE -->
  <div class="flex justify-center">

    <div class="relative float">

      <div class="w-72 h-72 rounded-full border-4 border-green-500 flex items-center justify-center glow-pulse">

        <div class="w-64 h-64 rounded-full border-4 border-green-200 overflow-hidden">
          <img src="student1.jpg" class="w-full h-full object-cover">
        </div>

      </div>

      <div class="absolute right-0 top-10 bg-white px-3 py-1 rounded shadow text-xs">
        Instant Payment
      </div>

      <div class="absolute left-1/2 -bottom-5 transform -translate-x-1/2 bg-white px-3 py-1 rounded shadow text-xs">
        Trusted by Students
      </div>

    </div>

  </div>

</div>

<!-- SCRIPT -->
<script>
function copyUPI() {
  const text = document.getElementById("upiText").innerText;
  navigator.clipboard.writeText(text);

  const msg = document.getElementById("copyMsg");
  msg.classList.remove("hidden");

  setTimeout(() => {
    msg.classList.add("hidden");
  }, 2000);
}

function sendWhatsApp() {
  const email = document.getElementById("email").value.trim();
  const course = document.getElementById("course").value;

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!course) {
    alert("⚠️ Please select a course");
    return;
  }

  if (!email) {
    alert("⚠️ Please enter your email");
    return;
  }

  if (!emailPattern.test(email)) {
    alert("❌ Invalid email");
    return;
  }

  const msg = `Hi, I have completed UPI payment.\n\nCourse: ${course}\nEmail: ${email}`;
  const url = `https://wa.me/917439034248?text=${encodeURIComponent(msg)}`;

  window.open(url, '_blank');
}
</script>

</body>
</html>
