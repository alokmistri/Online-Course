<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Classes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-[#d9dde3] via-[#eef1f5] to-[#f8f9fb] text-gray-800 min-h-screen">

  <!-- HEADER -->
  <div class="flex justify-between items-center p-4">
    <button onclick="window.location.href='index.html'" class="text-orange-500 text-sm">
      ← Back
    </button>
    <h1 class="font-bold">Demo Classes</h1>
  </div>

  <!-- TITLE -->
  <div class="text-center mt-4">
    <h1 class="text-3xl font-bold">🎓 Watch Demo Classes</h1>
    <p class="text-gray-500 mt-2">Try before you enroll</p>
  </div>

  <!-- AD SECTION -->
  <div class="max-w-5xl mx-auto px-4 mt-6">
    <div class="bg-blue-600 text-white rounded-xl p-4 text-center shadow">
      🔥 Limited Offer – Get Discount Now!
    </div>
  </div>

  <!-- COURSES -->
  <div class="max-w-5xl mx-auto mt-8 px-4 space-y-4">

    <!-- MS BASIC -->
    <div class="course-card flex gap-4 items-center bg-white p-4 rounded-xl shadow" data-price="499">
      <img src="https://via.placeholder.com/80" class="w-20 h-20 rounded-lg">
      <div class="flex-1">
        <h2 class="font-semibold">MS Basic</h2>
        <p class="text-green-600 text-xs emi-text"></p>
        <a href="msbasicdemo.html" class="text-blue-600 text-sm">▶ Demo</a>
      </div>
      <a href="ms-basic.html?course=MS Basic&price=499" class="bg-orange-500 text-white px-3 py-1 rounded">View</a>
    </div>

    <!-- EXCEL -->
    <div class="course-card flex gap-4 items-center bg-white p-4 rounded-xl shadow" data-price="999">
      <img src="https://via.placeholder.com/80" class="w-20 h-20 rounded-lg">
      <div class="flex-1">
        <h2 class="font-semibold">Advanced Excel</h2>
        <p class="text-green-600 text-xs emi-text"></p>
        <a href="exceldemo.html" class="text-blue-600 text-sm">▶ Demo</a>
      </div>
      <a href="excell.html?course=Advanced Excel&price=999" class="bg-orange-500 text-white px-3 py-1 rounded">View</a>
    </div>

    <!-- TALLY -->
    <div class="course-card flex gap-4 items-center bg-white p-4 rounded-xl shadow" data-price="1499">
      <img src="https://via.placeholder.com/80" class="w-20 h-20 rounded-lg">
      <div class="flex-1">
        <h2 class="font-semibold">Tally GST</h2>
        <p class="text-green-600 text-xs emi-text"></p>
        <a href="tallydemo.html" class="text-blue-600 text-sm">▶ Demo</a>
      </div>
      <a href="tally.html?course=Tally&price=1499" class="bg-orange-500 text-white px-3 py-1 rounded">View</a>
    </div>

    <!-- POWER BI -->
    <div class="course-card flex gap-4 items-center bg-white p-4 rounded-xl shadow" data-price="1999">
      <img src="https://via.placeholder.com/80" class="w-20 h-20 rounded-lg">
      <div class="flex-1">
        <h2 class="font-semibold">Power BI</h2>
        <p class="text-green-600 text-xs emi-text"></p>
        <a href="powerbidemo.html" class="text-blue-600 text-sm">▶ Demo</a>
      </div>
      <a href="powerbi.html?course=Power BI&price=1999" class="bg-orange-500 text-white px-3 py-1 rounded">View</a>
    </div>

    <!-- PEACHTREE -->
    <div class="course-card flex gap-4 items-center bg-white p-4 rounded-xl shadow" data-price="999">
      <img src="https://via.placeholder.com/80" class="w-20 h-20 rounded-lg">
      <div class="flex-1">
        <h2 class="font-semibold">Peachtree</h2>
        <p class="text-green-600 text-xs emi-text"></p>
        <a href="peachtreedemo.html" class="text-blue-600 text-sm">▶ Demo</a>
      </div>
      <a href="peachtree.html?course=Peachtree&price=999" class="bg-orange-500 text-white px-3 py-1 rounded">View</a>
    </div>

    <!-- MS ACCESS -->
    <div class="flex gap-4 items-center bg-white p-4 rounded-xl shadow">
      <img src="https://via.placeholder.com/80" class="w-20 h-20 rounded-lg">
      <div class="flex-1">
        <h2 class="font-semibold">MS Access</h2>
        <p class="text-gray-500 text-xs">No EMI</p>
        <a href="msaccessdemo.html" class="text-blue-600 text-sm">▶ Demo</a>
      </div>
      <a href="msaccess.html?course=MS Access&price=99" class="bg-orange-500 text-white px-3 py-1 rounded">View</a>
    </div>

  </div>

  <!-- EMI SCRIPT -->
  <script>
    document.querySelectorAll(".course-card").forEach(card => {
      const price = parseFloat(card.getAttribute("data-price"));
      const emiText = card.querySelector(".emi-text");

      if (price > 99) {
        const emi = Math.ceil(price / 6);
        emiText.innerText = `EMI from ₹${emi}/month`;
      }
    });
  </script>

</body>
</html>
